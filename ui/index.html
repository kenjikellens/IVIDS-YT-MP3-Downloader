<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVIDS YT MP3 Downloader</title>
    <meta name="description" content="A premium desktop utility to download YouTube playlists and single videos to high-quality audio formats.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet with Cache-Buster version parameter -->
    <link rel="stylesheet" href="style.css?v=1.2.0">
    
    <!-- Modular JavaScript Controllers (loaded in order with defer) -->
    <script src="js/utils.js?v=1.2.0" defer></script>
    <script src="js/i18n.js?v=1.2.0" defer></script>
    <script src="js/home.js?v=1.2.0" defer></script>
    <script src="js/pipeline.js?v=1.2.0" defer></script>
    <script src="js/ytdl.js?v=1.2.0" defer></script>
    <script src="js/organiser.js?v=1.2.0" defer></script>
    <script src="js/settings.js?v=1.2.0" defer></script>
    
    <!-- Main SPA Router & Shell Manager -->
    <script src="script.js?v=1.2.0" defer></script>
</head>
<body>

    <!-- Custom titlebar for frameless windows -->
    <div class="titlebar" id="app-titlebar">
        <div class="titlebar-drag-region"></div>
        <div class="titlebar-left">
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle Navigation Sidebar">☰</button>
            <div class="titlebar-logo">
                <svg class="titlebar-icon" viewBox="0 0 24 24" width="14" height="14">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
                <span class="titlebar-text" data-i18n="titlebar">IVIDS YT MP3 Downloader</span>
            </div>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn btn-minimize" id="btn-minimize" aria-label="Minimize Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <rect y="4.5" width="10" height="1" fill="currentColor"/>
                </svg>
            </button>
            <button class="titlebar-btn btn-maximize" id="btn-maximize" aria-label="Maximize Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/>
                </svg>
            </button>
            <button class="titlebar-btn btn-close" id="btn-close" aria-label="Close Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <polygon points="10,1 9,0 5,4 1,0 0,1 4,5 0,9 1,10 5,6 9,10 10,9 6,5" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Sidebar overlay backdrop for mobile collapse/slide layouts -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- App Shell layout wrapping sidebar and main viewport -->
    <div class="app-shell">

        <!-- Sidebar Navigation Menu -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-label" data-i18n="nav_navigation">Navigation</div>
            <div class="nav-item active" id="nav-home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span data-i18n="nav_home">Home</span>
            </div>
            
            <div class="nav-item" id="nav-pipeline">
                <!-- Video/Play icon for Workflow Pipeline -->
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                <span data-i18n="nav_pipeline">Workflow Pipeline</span>
            </div>
            
            <div class="nav-item" id="nav-ytdl">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                <span data-i18n="nav_ytdl">MP3 YT downloader</span>
            </div>

            <div class="nav-item" id="nav-organiser">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span data-i18n="nav_organiser">Music Organiser</span>
            </div>
            
            <div class="sidebar-spacer"></div>
            
            <div class="nav-item" id="nav-settings">
                <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                <span data-i18n="nav_settings">Settings</span>
            </div>
        </nav>

        <!-- Main Content Area where templates are loaded dynamically -->
        <main class="main-content" id="main-content">
            <!-- Loading indicator before dynamic pages load -->
            <div style="display: flex; height: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 16px;">
                <div class="spinner"></div>
                <p>Loading application interface...</p>
            </div>
        </main>
    </div>

</body>
</html>
