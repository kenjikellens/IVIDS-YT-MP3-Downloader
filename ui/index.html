<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVIDS YT MP3 Downloader</title>
    <meta name="description" content="A premium desktop utility to download YouTube playlists and single videos to high-quality audio formats.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet with Cache-Buster version parameter -->
    <link rel="stylesheet" href="style.css?v=1.2.0">
    <!-- Main JavaScript script with Cache-Buster version parameter -->
    <script src="script.js?v=1.2.0" defer></script>
</head>
<body>

    <!-- Custom titlebar for frameless windows -->
    <div class="titlebar" id="app-titlebar">
        <div class="titlebar-drag-region"></div>
        <div style="display:flex;align-items:center;height:100%;">
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle Navigation Sidebar">☰</button>
            <div class="titlebar-logo">
                <svg class="titlebar-icon" viewBox="0 0 24 24" width="14" height="14">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
                <span class="titlebar-text">IVIDS YT MP3 Downloader</span>
            </div>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn btn-minimize" id="btn-minimize" aria-label="Minimize Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <rect y="4.5" width="10" height="1" fill="currentColor"/>
                </svg>
            </button>
            <button class="titlebar-btn btn-maximize" id="btn-maximize" aria-label="Maximize Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/>
                </svg>
            </button>
            <button class="titlebar-btn btn-close" id="btn-close" aria-label="Close Window">
                <svg viewBox="0 0 10 10" width="10" height="10">
                    <polygon points="10,1 9,0 5,4 1,0 0,1 4,5 0,9 1,10 5,6 9,10 10,9 6,5" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Sidebar overlay backdrop for mobile collapse/slide layouts -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- App Shell layout wrapping sidebar and main viewport -->
    <div class="app-shell">

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-label">Navigation</div>
            <div class="nav-item active" id="nav-home">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Home
            </div>
            <div class="nav-item" id="nav-downloads">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10l-4-4h3V9h2v3h3l-4 4z"/></svg>
                Downloaded Files
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content" id="main-content">

            <!-- ===== PAGE: HOME ===== -->
            <div class="page active" id="page-home">
                <header class="page-header">
                    <h1>Download Audio</h1>
                    <button id="theme-btn" class="btn-theme" title="Toggle Theme" aria-label="Toggle Application Theme">☀️</button>
                </header>

                <div class="app-layout">
                    <!-- Top-Left: Config settings card -->
                    <section class="card config-panel" id="settings-card">
                        <div class="form-row">
                            <label for="url-input">YouTube URL</label>
                            <input type="text" id="url-input" placeholder="Paste playlist or video link here..." autocomplete="off">
                        </div>
                        <div class="form-row">
                            <label>Save to</label>
                            <div class="dir-row">
                                <div class="dir-path" id="dir-path">Loading...</div>
                                <button class="btn-browse" id="btn-browse">Browse</button>
                            </div>
                        </div>

                        <!-- Advanced Settings Disclosure Trigger -->
                        <button class="advanced-toggle" id="advanced-toggle">
                            ⚙ Advanced Settings <span class="chevron" id="advanced-chevron">▼</span>
                        </button>

                        <!-- Advanced Settings panel grid -->
                        <div class="advanced-panel" id="advanced-panel">
                            <div class="adv-group">
                                <label for="format-select">Audio Format</label>
                                <select id="format-select">
                                    <option value="mp3" selected>MP3</option>
                                    <option value="m4a">M4A</option>
                                    <option value="wav">WAV</option>
                                </select>
                            </div>
                            <div class="adv-group">
                                <label for="quality-select">Audio Quality</label>
                                <select id="quality-select">
                                    <option value="320k">320 kbps</option>
                                    <option value="192k" selected>192 kbps</option>
                                    <option value="128k">128 kbps</option>
                                </select>
                            </div>
                        </div>

                        <div class="actions">
                            <button class="btn-download" id="btn-download">Start Download</button>
                            <button class="btn-cancel" id="btn-cancel" disabled>Cancel</button>
                        </div>
                    </section>

                    <!-- Right: Preview panel -->
                    <section class="card preview-panel" id="preview-panel">
                        <div class="preview-header">
                            <span class="preview-title">Preview</span>
                            <button class="btn-secondary" id="btn-load-info">Load Info</button>
                        </div>

                        <!-- STATE: Empty -->
                        <div class="preview-empty" id="state-empty">
                            <svg class="preview-empty-icon" viewBox="0 0 24 24" width="44" height="44">
                                <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9.5 16.5l7-4.5-7-4.5v9z"/>
                            </svg>
                            <p>Paste a YouTube URL to see a preview</p>
                        </div>

                        <!-- STATE: Single Video Preview -->
                        <div id="state-single" style="display:none; flex-direction:column; flex:1;">
                            <div class="video-card" id="single-video-card">
                                <!-- Populated dynamically by script.js -->
                            </div>
                        </div>

                        <!-- STATE: Playlist Preview -->
                        <div id="state-playlist" style="display:none; flex-direction:column; flex:1; min-height:0;">
                            <!-- Select all / deselect toolbar -->
                            <div class="track-list-header">
                                <span class="track-count" id="track-count-text">0 tracks found</span>
                                <button class="btn-select" id="btn-select-all">Select All</button>
                                <button class="btn-select" id="btn-deselect-all">Deselect All</button>
                            </div>

                            <!-- Scrollable track checklist card items -->
                            <div class="track-list-items" id="track-list">
                                <!-- Populated dynamically by script.js -->
                            </div>
                        </div>
                    </section>

                    <!-- Bottom-Left: Console CLI log panel -->
                    <section class="card output-panel" id="progress-section">
                        <div class="progress-header">
                            <span class="status-text" id="status-text">Status: Idle</span>
                            <span class="track-text" id="track-text"></span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="progress-fill"></div>
                        </div>
                        <div class="console" id="console" role="log"></div>
                    </section>
                </div>
            </div>

            <!-- ===== PAGE: DOWNLOADED FILES ===== -->
            <div class="page" id="page-downloads">
                <header class="page-header">
                    <h1>Downloaded Files</h1>
                    <button class="btn-secondary" id="btn-clear-history">Clear History</button>
                </header>
                <div class="downloads-empty" id="downloads-empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" style="fill:var(--text-muted); opacity:0.5; margin-bottom:12px;">
                        <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-3H6v-2h12v2z"/>
                    </svg>
                    <p style="color:var(--text-muted); font-size:13px;">No downloaded tracks in history yet.</p>
                </div>
                <div class="downloads-list" id="downloads-list-items">
                    <!-- Populated dynamically by script.js -->
                </div>
            </div>

        </div>
    </div>

</body>
</html>
