<!--
  Workflow Pipeline pagina fragment (pipeline.html)
  Dit is de gecombineerde download- en sorteer-pipeline interface. Het stelt gebruikers in staat
  om een YouTube link op te geven en de downloads automatisch te laten taggen en ordenen door AI.
-->
<header class="page-header">
    <h1 data-i18n="pipeline_header">Download & Sorteer Pipeline</h1>
</header>

<div class="app-layout home-layout">
    <!-- Left Column: Pipeline Steps Configuration Panels -->
    <div class="left-column">
        
        <!-- Step 1: Downloader Card -->
        <section class="card config-panel" id="pipeline-downloader-card">
            <div class="step-header" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="pipeline-enable-downloader" checked style="width: auto; margin: 0; cursor: pointer;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-color); cursor: pointer;"><label for="pipeline-enable-downloader" style="cursor: pointer;">Stap 1: YouTube Downloader</label></h3>
            </div>
            
            <div id="pipeline-downloader-settings">
                <div class="form-row vertical-row">
                    <label for="pipeline-url-input">YouTube URL</label>
                    <input type="text" id="pipeline-url-input" placeholder="Paste playlist or video link here..." autocomplete="off">
                </div>
                
                <div class="form-row vertical-row">
                    <label>Tijdelijke Downloadmap</label>
                    <div class="dir-row">
                        <div class="dir-path" id="pipeline-download-path">Loading...</div>
                        <button class="btn-browse" id="btn-pipeline-browse-download">Browse</button>
                        <input type="file" id="pipeline-download-input" webkitdirectory directory style="display: none;">
                    </div>
                </div>
                
                <div class="form-row vertical-row">
                    <label for="pipeline-media-type-select">Media Type</label>
                    <div class="media-type-select-wrapper">
                        <select id="pipeline-media-type-select">
                            <option value="audio" selected>🎵 Audio</option>
                            <option value="video">🎬 Video</option>
                        </select>
                    </div>
                </div>
                
                <!-- Pipeline Audio/Video settings toggled dynamically -->
                <div id="pipeline-audio-options" style="display: contents;">
                    <div class="form-row vertical-row" style="margin-top: 12px;">
                        <label for="pipeline-format-select">Audio Format</label>
                        <select id="pipeline-format-select">
                            <option value="mp3" selected>MP3</option>
                            <option value="m4a">M4A</option>
                            <option value="wav">WAV</option>
                            <option value="opus">Opus</option>
                            <option value="best">Original (No Transcoding)</option>
                        </select>
                    </div>
                    <div class="form-row vertical-row" style="margin-top: 12px;">
                        <label for="pipeline-quality-select">Audio Quality</label>
                        <select id="pipeline-quality-select">
                            <option value="320k">320 kbps (best transcode)</option>
                            <option value="256k">256 kbps (very high)</option>
                            <option value="192k" selected>192 kbps (high)</option>
                            <option value="128k">128 kbps (medium)</option>
                        </select>
                    </div>
                </div>
                
                <div id="pipeline-video-options" style="display: none;">
                    <div class="form-row vertical-row" style="margin-top: 12px;">
                        <label for="pipeline-video-format">Video Format</label>
                        <select id="pipeline-video-format">
                            <option value="mp4" selected>MP4</option>
                            <option value="webm">WebM</option>
                            <option value="mkv">MKV</option>
                        </select>
                    </div>
                    <div class="form-row vertical-row" style="margin-top: 12px;">
                        <label for="pipeline-video-quality">Video Quality</label>
                        <select id="pipeline-video-quality">
                            <option value="best" selected>Best Available</option>
                            <option value="1080">1080p (Full HD)</option>
                            <option value="720">720p (HD)</option>
                            <option value="480">480p (SD)</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Step 2: Organiser Card -->
        <section class="card config-panel" id="pipeline-organiser-card" style="margin-top: 20px;">
            <div class="step-header" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="pipeline-enable-organiser" checked style="width: auto; margin: 0; cursor: pointer;">
                <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-color); cursor: pointer;"><label for="pipeline-enable-organiser" style="cursor: pointer;">Stap 2: AI Organiser & Sorter</label></h3>
            </div>
            
            <div id="pipeline-organiser-settings">
                <div class="form-row vertical-row">
                    <label>Uiteindelijke Doelmap</label>
                    <div class="dir-row">
                        <div class="dir-path" id="pipeline-target-path">Select target folder...</div>
                        <button class="btn-browse" id="btn-pipeline-browse-target">Browse</button>
                        <input type="file" id="pipeline-target-input" webkitdirectory directory style="display: none;">
                    </div>
                </div>
                
                <div class="form-row vertical-row">
                    <label for="pipeline-mode-select">Organisatiemethode</label>
                    <div class="media-type-select-wrapper">
                        <select id="pipeline-mode-select">
                            <option value="classic_periods" selected>Muziek - Klassieke Periodes (Standaard)</option>
                            <option value="artist_album">Muziek - Artiest / Album</option>
                            <option value="channel">Video - Kanaal / YouTuber</option>
                            <option value="flat">Geen submappen (Platte lijst)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row checkbox-row" style="margin-top: 10px;">
                    <input type="checkbox" id="pipeline-delete-source" checked>
                    <label for="pipeline-delete-source">Verplaatsen en tijdelijke bestanden opruimen</label>
                </div>
                
                <div class="form-row checkbox-row" style="margin-top: 10px;">
                    <input type="checkbox" id="pipeline-use-shazam">
                    <label for="pipeline-use-shazam">Shazam Audio Fallback gebruiken</label>
                </div>
            </div>
        </section>
        
        <!-- Action buttons for starting or cancelling the pipeline -->
        <div class="actions" style="margin-top: 20px;">
            <button class="btn-download" id="btn-pipeline-start">Start Pipeline</button>
            <button class="btn-cancel" id="btn-pipeline-cancel" style="display: none;" disabled>Cancel</button>
        </div>
    </div>
    
    <!-- Middle/Right Column: Preview list items -->
    <div class="left-column" style="flex: 1.2;">
        <section class="card preview-panel" id="pipeline-preview-panel" style="height: 100%;">
            <div class="preview-header">
                <span class="preview-title">Preview</span>
                <button class="btn-secondary" id="btn-pipeline-load-info">Info laden</button>
            </div>
            
            <!-- Preview Empty State -->
            <div class="preview-empty" id="pipeline-state-empty">
                <svg class="preview-empty-icon" viewBox="0 0 24 24" width="44" height="44">
                    <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9.5 16.5l7-4.5-7-4.5v9z"/>
                </svg>
                <p>Paste a YouTube URL to see a preview</p>
            </div>
            
            <!-- Playlist Preview State -->
            <div id="pipeline-state-playlist" class="preview-state-playlist" style="display: none;">
                <div class="track-list-header">
                    <span class="track-count" id="pipeline-track-count-text">0 tracks found</span>
                    <button class="btn-select" id="btn-pipeline-select-all">Select All</button>
                    <button class="btn-select" id="btn-pipeline-deselect-all">Deselect All</button>
                </div>
                <div class="track-list-items" id="pipeline-track-list">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </section>
    </div>
    
    <!-- Right Column: Status info, Progress bars, and Console Logs -->
    <div class="output-panel" id="pipeline-progress-section" style="flex: 1.3;">
        <!-- Overall Status Card -->
        <section class="card overall-status-card status-idle" id="pipeline-status-card">
            <div class="progress-header">
                <div class="status-left-group">
                    <span class="status-dot" id="pipeline-status-dot"></span>
                    <span class="status-text" id="pipeline-status-text">Status: Idle</span>
                </div>
                <span class="track-text" id="pipeline-track-text"></span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="pipeline-progress-fill"></div>
            </div>
        </section>
        
        <!-- Track progress circular loaders -->
        <section class="card active-progress-container" id="pipeline-active-progress"></section>
        
        <!-- Console Logs card -->
        <div class="console" id="pipeline-console" role="log"></div>
    </div>
</div>
